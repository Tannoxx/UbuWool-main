# ──────────────────────────────────────────────────────────────────────────────
#  UbuTag — Configuration globale
# ──────────────────────────────────────────────────────────────────────────────

# Lobby principal (renvoyé après une partie). Optionnel : si non défini, le
# plugin renvoie au lobby de l'arène ou au spawn du monde.
main-lobby:
  world: ""
  x: 0.0
  y: 0.0
  z: 0.0
  yaw: 0.0
  pitch: 0.0
  set: false

# Paramètres par défaut utilisés à la création d'une nouvelle arène.
defaults:
  min-players: 2
  max-players: 16
  lobby-countdown-seconds: 30
  short-countdown-seconds: 10
  round-duration-seconds: 30
  rounds-per-game: 0           # 0 = jusqu'à ce qu'il ne reste qu'un joueur
  initial-tagged-ratio: 0.25   # 25 % des joueurs reçoivent la TNT au début
  speed-effect-amplifier: 1    # Speed II pour tout le monde
  jump-effect-amplifier: 1     # Jump Boost II pour tout le monde
  block-damage: false          # La TNT ne casse pas les blocs

# Cooldown anti-passback (secondes) après avoir reçu la TNT
tag-cooldown-seconds: 1

# Permettre aux joueurs morts de rester en spectateur jusqu'à la fin
allow-spectate: true

# Stats / leaderboard
stats:
  enabled: true
  top-size: 10

# Sons
sounds:
  enabled: true
